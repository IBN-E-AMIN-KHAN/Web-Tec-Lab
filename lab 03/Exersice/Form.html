<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Registration Form</title>
    <link rel="stylesheet" href="../Styles/Form.css" />
  </head>
  <body>
    <div class="form-container">
      <div class="success-banner">Registration Successful! Welcome aboard.</div>

      <form>
        <h2>Create Account</h2>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="e.g. Username" />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="hello@example.com" />
        </div>

        <div class="form-group">
          <label for="role">Your Role</label>
          <select id="role">
            <option value="" disabled selected>Select your specialty</option>
            <option value="designer">Designer</option>
            <option value="developer">Developer</option>
            <option value="manager">Project Manager</option>
          </select>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="input-error"
            value="123"
          />
          <span class="error-message"
            >Password must be at least 8 characters.</span
          >
        </div>

        <button type="submit" class="submit-btn">Register Now</button>
      </form>
    </div>
  </body>
</html>

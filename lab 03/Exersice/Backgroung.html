
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Backgrounds Gellery</title>
    <link rel="stylesheet" href="../Styles/Background.css" />
  </head>
  <body>
    <header>
      <h1>CSS Backgrounds Demonstration</h1>
      <p>
        Exploring colors, gradients, patterns, multiple layers, and blend modes.
      </p>
    </header>

    <main class="grid-container">
      <div class="box solid-color">
        <h2>Solid Color</h2>
      </div>

      <div class="box bg-repeat">
        <h2>Repeat (Default)</h2>
      </div>
      <div class="box bg-repeat-x">
        <h2>Repeat-X</h2>
      </div>
      <div class="box bg-repeat-y">
        <h2>Repeat-Y</h2>
      </div>
      <div class="box bg-no-repeat">
        <h2>No Repeat (Centered)</h2>
      </div>

      <div class="box linear-gradient">
        <h2>Linear Gradient</h2>
      </div>
      <div class="box radial-gradient">
        <h2>Radial Gradient</h2>
      </div>

      <div class="box multiple-bg">
        <h2>Multiple Layers</h2>
      </div>

      <div class="box blend-multiply">
        <h2>Blend: Multiply</h2>
      </div>
      <div class="box blend-screen">
        <h2>Blend: Screen</h2>
      </div>
      <div class="box blend-luminosity">
        <h2>Blend: Luminosity</h2>
      </div>
      <div class="box blend-overlay">
        <h2>Blend: Overlay</h2>
      </div>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Styling Portfolio</title>
    <link rel="stylesheet" href="../Styles/Image.css" />
  </head>
  <body>
    <header>
      <h1>Image Styling Portfolio</h1>
      <p>A showcase of modern CSS image techniques</p>
    </header>

    <div class="gallery-grid">
      <div class="gallery-item">
        <img
          src="../Images/Gellery/images (1).jfif"
          alt="Rounded"
          class="img-rounded"
        />
        <div class="label">Rounded Corners</div>
      </div>

      <div class="gallery-item">
        <img
          src="../Images/Gellery/cool-funny-hipster-cat-with-fashionable-hat-vintage-round-sunglasses-listens-music-white-wireless-headphones-gray-background-creative-idea-concept-animal-style_338491-12636.avif"
          alt="Circle"
          class="img-circle"
        />
        <div class="label">Circular</div>
      </div>

      <div class="gallery-item">
        <img
          src="../Images/Gellery/images (2).jfif"
          alt="Shadow"
          class="img-border-shadow"
        />
        <div class="label">Borders & Shadows</div>
      </div>

      <div class="gallery-item">
        <div class="img-container">
          <img
            src="../Images/Gellery/0_qeurjXuUaA1o3nCc.jpg"
            alt="Hover"
            class="img-hover"
          />
        </div>
        <div class="label">Hover Scale</div>
      </div>

      <div class="gallery-item">
        <img
          src="../Images/Gellery/premium_photo-1666901328734-3c6eb9b6b979.avif"
          alt="Filter"
          class="img-filter"
        />
        <div class="label">CSS Filters</div>
      </div>

      <div class="gallery-item overlay-container">
        <img src="../Images/Gellery/01.jpg" alt="Overlay" />
        <div class="overlay">
          <div class="overlay-text">My profile Picture</div>
        </div>
        <div class="label">Text Overlay</div>
      </div>
    </div>
  </body>
</html>

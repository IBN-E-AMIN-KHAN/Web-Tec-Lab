<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Transform Showcase</title>
    <link rel="stylesheet" href="../Styles/Transform.css" />
  </head>
  <body>
    <header>
      <h1>CSS Transform Showcase</h1>
      <p>Hover over the cards to see the transformations</p>
    </header>

    <div class="transform-grid">
      <div class="stage">
        <div class="box rotate">Rotate</div>
        <p>rotate(45deg)</p>
      </div>

      <div class="stage">
        <div class="box scale">Scale</div>
        <p>scale(1.5)</p>
      </div>

      <div class="stage">
        <div class="box translate">Translate</div>
        <p>translate(20px, -20px)</p>
      </div>

      <div class="stage">
        <div class="box origin">Origin</div>
        <p>origin: top left</p>
      </div>

      <div class="stage perspective-container">
        <div class="box rotate-3d">3D Flip</div>
        <p>rotateY(180deg)</p>
      </div>

      <div class="stage">
        <div class="box combined">Combined</div>
        <p>Rotate + Scale + Move</p>
      </div>
    </div>
  </body>
</html>

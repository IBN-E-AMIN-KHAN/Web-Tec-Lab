<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Styling Collection</title>
    <link rel="stylesheet" href="../Styles/Button.css">
</head>
<body>

    <section class="button-gallery">
        <h2>Button Styling Collection</h2>

        <div class="button-grid">
            <div class="card">
                <h3>Sizes & Shapes</h3>
                <button class="btn btn-sm btn-primary">Small</button>
                <button class="btn btn-md btn-primary">Medium</button>
                <button class="btn btn-lg btn-primary">Large</button>
                <button class="btn btn-md btn-primary btn-pill">Pill Shape</button>
            </div>

            <div class="card">
                <h3>Gradients & Shadows</h3>
                <button class="btn btn-md btn-gradient">Gradient</button>
                <button class="btn btn-md btn-shadow">Floating Shadow</button>
            </div>

            <div class="card">
                <h3>States & Transitions</h3>
                <button class="btn btn-md btn-outline">Hover Me</button>
                <button class="btn btn-md btn-success" disabled>Disabled State</button>
            </div>
        </div>
    </section>

</body>
</html>

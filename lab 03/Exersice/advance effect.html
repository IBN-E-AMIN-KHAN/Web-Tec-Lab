<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced CSS Feature Gallery</title>
    <link rel="stylesheet" href="../Styles/advance effect.css" />
  </head>
  <body>
    <div class="dashboard">
      <header>
        <h1 class="gradient-header">Advanced UI Features</h1>
        <p>A professional showcase of modern CSS capabilities</p>
      </header>

      <div class="feature-grid">
        <div class="card complex-shadow">
          <h3>Text Artistry</h3>
          <h2 class="gradient-text">Gradient Horizon</h2>
          <h2 class="clipped-text">TEXTURE</h2>
          <p class="caption">Gradient fill & Image mask clipping</p>
        </div>

        <div class="card complex-shadow">
          <h3>Custom Form Logic</h3>
          <div class="input-row">
            <label class="custom-checkbox">
              <input type="checkbox" checked />
              <span class="checkmark"></span>
              Enable Feature
            </label>
          </div>
          <div class="input-row">
            <label class="custom-radio">
              <input type="radio" name="ui-choice" checked />
              <span class="radio-dot"></span>
              Premium Mode
            </label>
          </div>
        </div>

        <div class="card complex-shadow">
          <h3>System Animations</h3>
          <div class="loader-box">
            <div class="glow-spinner"></div>
            <div class="bar-loader">
              <span></span><span></span><span></span>
            </div>
          </div>
          <p class="caption">Keyframe-based loading states</p>
        </div>
      </div>
    </div>
  </body>
</html>

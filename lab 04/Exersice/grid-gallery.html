<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 6: CSS Grid Photo Gallery</title>
    <link rel="stylesheet" href="../Styles/base.css" />
    <link rel="stylesheet" href="../Styles/grid.css" />
  </head>
  <body>
    <div class="container">
      <h1>Photo Gallery</h1>

      <section class="featured-section">
        <div class="gallery-item main-feat">
          <img src="https://picsum.photos/800/600?random=1" alt="1" />
          <div class="overlay">Featured</div>
        </div>
        <div class="gallery-item s1">
          <img src="https://picsum.photos/400/300?random=2" alt="2" />
        </div>
        <div class="gallery-item s2">
          <img src="https://picsum.photos/400/300?random=3" alt="3" />
        </div>
        <div class="gallery-item s3">
          <img src="https://picsum.photos/400/300?random=4" alt="4" />
        </div>
        <div class="gallery-item s4">
          <img src="https://picsum.photos/400/300?random=5" alt="5" />
        </div>
      </section>

      <hr />

      <h2>Masonry Dense Grid</h2>
      <div class="gallery-grid">
        <div class="gallery-item tall">
          <img src="https://picsum.photos/400/800?random=6" alt="6" />
          <div class="overlay">Vertical Shot</div>
        </div>
        <div class="gallery-item">
          <img src="https://picsum.photos/400/400?random=7" alt="7" />
        </div>
        <div class="gallery-item wide">
          <img src="https://picsum.photos/800/400?random=8" alt="8" />
          <div class="overlay">Landscape Shot</div>
        </div>
        <div class="gallery-item">
          <img src="https://picsum.photos/400/400?random=9" alt="9" />
        </div>
        <div class="gallery-item">
          <img src="https://picsum.photos/400/400?random=10" alt="10" />
        </div>
        <div class="gallery-item tall">
          <img src="https://picsum.photos/400/800?random=11" alt="11" />
        </div>
      </div>
    </div>
  </body>
</html>

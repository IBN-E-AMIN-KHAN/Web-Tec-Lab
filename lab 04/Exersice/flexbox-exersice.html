<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 12: Flexbox Form Builder</title>
    <link rel="stylesheet" href="../Styles/base.css" />
    <link rel="stylesheet" href="../Styles/flexbox.css" />
  </head>
  <body>
    <div class="container">
      <h1>Registration Form</h1>
      <p>
        This form uses Flexbox to switch between single and multi-column
        layouts.
      </p>

      <form class="flex-form">
        <div class="form-row">
          <div class="form-group half">
            <label for="fname">First Name</label>
            <input type="text" id="fname" placeholder="John" required />
          </div>
          <div class="form-group half">
            <label for="lname">Last Name</label>
            <input type="text" id="lname" placeholder="Doe" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group third">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="john@example.com" />
          </div>
          <div class="form-group third">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="+92 300 1234567" />
          </div>
          <div class="form-group third">
            <label for="gender">Gender</label>
            <select id="gender">
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="comments">Address/Comments</label>
            <textarea id="comments" rows="3"></textarea>
          </div>
        </div>

        <button type="submit" class="form-submit">Register Now</button>
      </form>
    </div>
  </body>
</html>

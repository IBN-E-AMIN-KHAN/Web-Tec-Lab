<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 9: Admin Dashboard</title>
    <link rel="stylesheet" href="../Styles/base.css" />
    <link rel="stylesheet" href="../Styles/grid.css" />
    <link rel="stylesheet" href="../Styles/flexcard.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="dash-sidebar">
        <div style="padding: 20px; text-align: center">
          <strong>ADMIN</strong>
        </div>
        <nav style="padding: 20px">
          <p>🏠 <span class="sidebar-text">Dashboard</span></p>
          <p>📊 <span class="sidebar-text">Analytics</span></p>
          <p>👥 <span class="sidebar-text">Users</span></p>
        </nav>
      </aside>

      <header
        class="dash-header"
        style="display: flex; align-items: center; padding: 0 20px"
      >
        <h3>Dashboard Overview</h3>
      </header>

      <main class="dash-main">
        <section class="stats-grid">
          <div class="stat-card">
            <img
              src="https://picsum.photos/50"
              alt="icon"
              style="border-radius: 50%; margin-bottom: 10px"
            />
            <h4>$24,000</h4>
            <p>Total Revenue</p>
          </div>
          <div class="stat-card">
            <img
              src="https://picsum.photos/51"
              alt="icon"
              style="border-radius: 50%; margin-bottom: 10px"
            />
            <h4>1,200</h4>
            <p>New Users</p>
          </div>
          <div class="stat-card">
            <img
              src="https://picsum.photos/52"
              alt="icon"
              style="border-radius: 50%; margin-bottom: 10px"
            />
            <h4>45</h4>
            <p>Pending Orders</p>
          </div>
          <div class="stat-card">
            <img
              src="https://picsum.photos/53"
              alt="icon"
              style="border-radius: 50%; margin-bottom: 10px"
            />
            <h4>89%</h4>
            <p>Satisfaction</p>
          </div>
        </section>

        <section
          style="
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
          "
        >
          <h3>Recent Activity</h3>
          <p>
            This is a responsive main content area. On mobile, the sidebar
            disappears to maximize space.
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
